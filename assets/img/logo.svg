<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Isometry">
  <defs>
    <linearGradient id="iso-top" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#8fbcff"/>
      <stop offset="1" stop-color="#6ea8fe"/>
    </linearGradient>
    <linearGradient id="iso-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f63b0"/>
      <stop offset="1" stop-color="#2f4a86"/>
    </linearGradient>
    <linearGradient id="iso-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a86df"/>
      <stop offset="1" stop-color="#44699f"/>
    </linearGradient>
    <linearGradient id="iso-gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8abf2"/>
      <stop offset="1" stop-color="#a774e0"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="60" cy="99" rx="30" ry="6.5" fill="#000000" opacity="0.18"/>

  <!-- isometric cube: the tile / world -->
  <path d="M60 27 L94 44 L60 61 L26 44 Z" fill="url(#iso-top)"/>
  <path d="M26 44 L60 61 L60 95 L26 78 Z" fill="url(#iso-left)"/>
  <path d="M94 44 L60 61 L60 95 L94 78 Z" fill="url(#iso-right)"/>
  <!-- top-edge highlight -->
  <path d="M60 27 L94 44 L60 61 L26 44 Z" fill="none" stroke="#a9ccff" stroke-width="1.2" opacity="0.55"/>

  <!-- floating gem: an actor / entity on the map -->
  <path d="M60 3 L69 13 L60 23 L51 13 Z" fill="url(#iso-gem)"/>
  <path d="M60 3 L69 13 L60 23 L51 13 Z" fill="none" stroke="#ecd6fb" stroke-width="1" opacity="0.6"/>
</svg>
